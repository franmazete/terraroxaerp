name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs duplicadas se houver push novo no mesmo PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + typecheck + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Next build
        # Variáveis de ambiente do Supabase ficam ausentes propositalmente
        # — o app detecta e cai no modo mock. CI valida o caminho real.
        run: npm run build
